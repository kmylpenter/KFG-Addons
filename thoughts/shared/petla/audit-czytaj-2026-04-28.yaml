    location: "files/hooks/czytaj/_speak.py:39-43 vs files/hooks/czytaj/piper_stream.py:44-82"
    suggestion: "Delete preheat_audio (no-op). Delete or merge unlock_audio_routing. Pick one strategy with documented purpose."
