    location: "diff ~/.claude/hooks/czytaj/_speak.py vs addons/czytaj/files/hooks/czytaj/_speak.py"
    suggestion: "Re-run install.sh. Add version stamp to _speak.py so log includes deployed version. Document install order requirement in README."
    found_in_iteration: 1
    status: open

  # ───── RELIABILITY LENS ─────
  - id: "R1"
    severity: critical
    lens: reliability
    item: "Stop hook reads stale transcript jsonl — Claude Code spawns hook before fsync. Confirmed Anthropic issue #15813. Root cause of all 5 'empty-turn-text' SKIPs in log."
    location: "files/hooks/czytaj/_speak.py:188-246 (current_turn_text)"
    suggestion: "Retry loop: if no assistant text after last user_idx, sleep 100ms and re-read up to 5 times. Total worst-case 1.55s — within 10s hook timeout. Differentiate empty-by-fsync vs empty-by-tool-only-turn for logging."
    research:
      - url: "https://github.com/anthropics/claude-code/issues/15813"
        finding: "Stop hook spawned before transcript fsync. Closed 'not planned'. User-side workaround required."
    found_in_iteration: 1
    status: open

  - id: "R2"
    severity: critical
    lens: reliability
    item: "is_mic_busy() is dead code that briefly was active and probably will be again — toggling between active/inactive in different installed versions creates total non-determinism."
    location: "files/hooks/czytaj/_speak.py:67-107 (definition), :318-322 (commented-out caller)"
    suggestion: "DELETE the function entirely. The is_recording() check (Voice Typer flag) is sufficient and reliable. Documented-as-disabled but kept-in-code is a landmine."
    found_in_iteration: 1
    status: open

  - id: "R3"
    severity: critical
    lens: reliability
    item: "proc.communicate(timeout=2) leaks the entire piper_stream + paplay + watch_and_kill chain — TimeoutExpired swallowed and proc abandoned with start_new_session=True. Orphan accumulation across turns."
    location: "files/hooks/czytaj/_speak.py:403-417"
    suggestion: "Don't wait in hook. Single long-lived player daemon owns playback lifecycle. Hook becomes 'sendto socket(speak, text)' fire-and-forget. Or: explicit os.killpg(os.getpgid(proc.pid), SIGKILL) on TimeoutExpired."
    research:
      - url: "https://docs.python.org/3/library/subprocess.html#subprocess.Popen.communicate"
        finding: "Python docs: communicate timeout does NOT kill child — caller must clean up."
    found_in_iteration: 1
    status: open

  - id: "R4"
    severity: major
    lens: reliability
    item: "UPS hook chain takes 2-3 seconds (UPS-FIRED → UPS-MEDIA-STOPPED → UPS-KILLED-CLIENTS). Eats 20-30% of 10s hook timeout BEFORE other UPS hooks (skill-activation, memory-awareness) even start."
    location: "files/hooks/czytaj/user-prompt-submit.sh:15 (termux-media-player stop), :38-40 (pkill loop)"
    suggestion: "Drop synchronous termux-media-player stop — redundant with pkill paplay. Use pidfile pattern: piper_stream writes pid to ~/.claude/czytaj-stream.pid; UPS reads + kills that pid only."
    found_in_iteration: 1
    status: open

  - id: "R5"
    severity: major
    lens: reliability
    item: "FIFO write blocks indefinitely if paplay died before reading — daemon's piper-daemon child holds FIFO write fd open. Unlink only removes directory entry; fd remains valid; next write blocks forever."
    location: "files/hooks/czytaj/piper_stream.py:85-103, files/hooks/czytaj/piper_server.py:170-198"
    suggestion: "After fifo.unlink(), open FIFO with O_NONBLOCK in read mode briefly to drain pending bytes (releases SIGPIPE). Or use raw file with paplay tail. Or set non-blocking on daemon stdin/stdout."
    research:
      - url: "https://man7.org/linux/man-pages/man7/pipe.7.html"
        finding: "Writes to FIFO with no readers cause SIGPIPE only after kernel pipe buffer fills."
    found_in_iteration: 1
    status: open

  - id: "R6"
    severity: major
    lens: reliability
    item: "STATE_FILE flock + atomic-rename pattern is INCORRECT — load_state takes LOCK_SH on actual file inode, save_state writes tmp (different inode) then os.replace. The two locks are on different inodes."
    location: "files/hooks/czytaj/_speak.py:124-140 (load), :143-179 (save)"
    suggestion: "Both load and save take EXCLUSIVE flock on a SINGLE coordination file (reuse SPEAK_LOCK). Lock guards the operation, not the file inode. UPS reset_state_atomic must also take this lock."
    research:
      - url: "https://apenwarr.ca/log/20101213"
        finding: "'Everything you never wanted to know about file locking' — flock on tempfile is meaningless because rename creates new inode."
    found_in_iteration: 1
    status: open

  - id: "R7"
    severity: major
    lens: reliability
    item: "save_state fires AFTER speakable computed but BEFORE playback succeeds — if piper_stream fails, state is marked 'spoken' without audio. Next Stop hook sees full==spoken, computes new_text='', SKIP no-new-text. User experiences silent turn after any TTS failure."
    location: "files/hooks/czytaj/_speak.py:396 vs :405-417"
    suggestion: "Two-phase commit: write state with in_progress=true before playback, mark committed=true only on successful exit. On next hook: if in_progress without committed and elapsed > 30s, treat as not-spoken and re-attempt."
    found_in_iteration: 1
    status: open

  - id: "R8"
    severity: major
    lens: reliability
    item: "ensure_running() double-fork has no error reporting. server_alive() polls 50× × 0.1s = 5s blocking. If model load > 5s, client falls to fallback path while server still loading. First 1-3 hooks of session slow."
    location: "files/hooks/czytaj/piper_server.py:95-141, :131-134, :285,:293"
    suggestion: "Reorder: bind socket BEFORE writing pidfile. Increase deadline to 15s. Log spawn outcome ('server-spawn-timeout' / 'spawned-in=Xs' / 'already-alive'). Add _log() to piper_server.py."
    found_in_iteration: 1
    status: open

  - id: "R9"
    severity: major
    lens: reliability
    item: "toggle.sh `rm -rf $RUN_DIR` races against piper_server's run_server() bind. Rapid OFF→ON within 1s = bind fails EADDRINUSE, server crashes silently."
    location: "files/hooks/czytaj/toggle.sh:13, files/hooks/czytaj/piper_server.py:101,281-285"
    suggestion: "Sequence: kill old (SIGTERM + wait 1s) → verify no PID → rm -rf → mkdir → spawn. Or skip rm -rf entirely (server already cleans its socket on startup line 281)."
    found_in_iteration: 1
    status: open

  - id: "R10"
    severity: major
    lens: reliability
    item: "watch_and_kill thread polls every 150ms — voice typer can capture up to 150ms of TTS audio as user speech."
    location: "files/hooks/czytaj/piper_stream.py:85-103"
    suggestion: "Drop poll interval to 30ms. Or use inotify on flag's parent directory (python-inotify-simple package available in Termux)."
    found_in_iteration: 1
    status: open

  - id: "R11"
    severity: minor
    lens: reliability
    item: "_kill_audio_chain pactl iteration is racy — list, then kill. Between calls, new sink-input may exist."
    location: "files/hooks/czytaj/_speak.py:276-300"
    suggestion: "Add 50ms sleep after kill loop. Or filter by media.name cookie (PULSE_PROP_media.name)."
    found_in_iteration: 1
    status: open

  - id: "R12"
    severity: minor
    lens: reliability
    item: "subprocess.Popen with bare 'python3' name — could resolve to wrong python if cwd has shadowing 'python3' file."
    location: "files/hooks/czytaj/_speak.py:405"
    suggestion: "Use sys.executable or shutil.which('python3'). Don't trust bare name."
    found_in_iteration: 1
    status: open

  - id: "R13"
    severity: minor
    lens: reliability
    item: "_log writes to ~/.claude/czytaj.log without rotation — file grows unboundedly."
    location: "files/hooks/czytaj/_speak.py:22-29"
