issues:
- id: C1
  severity: critical
  lens: bugs+leaks+race-conditions
  item: paplay hangs forever when synthesis fails before any data is written to streaming
    FIFO
  location: files/hooks/czytaj/piper_stream.py:199-217
  suggestion: Wrap paplay.wait() with timeout; on server_speak_raw() returning None,
    open(fifo,'wb').close() to send EOF and unblock paplay. Set stop_event before
    paplay.wait() so watcher exits cleanly.
  status: fixed
- id: C2
  severity: critical
  lens: race-conditions
  item: load_state/save_state has no file locking — concurrent PreToolUse and Stop
    hooks can interleave read-modify-write losing one hook's update
  location: files/hooks/czytaj/_speak.py:63-76
  suggestion: fcntl.flock(LOCK_EX) around full read-modify-write, or atomic write
    via tempfile + os.replace().
  status: fixed
- id: C3
  severity: critical
  lens: race-conditions+leaks
  item: PreToolUse with kill_previous=False stacks multiple piper_stream/paplay processes
    during multi-tool turns — all serialize behind daemon_lock causing overlapping/late
    audio
  location: files/hooks/czytaj/_speak.py:179, pre-tool-use.py:18
  suggestion: 'Either kill_previous=True for PreToolUse, or coalesce: write desired
    text to single inbox file with monotonic seq, single in-flight piper_stream pulls
    latest seq.'
  status: fixed
- id: C4
  severity: critical
  lens: race-conditions
  item: 'ensure_running() double-spawn race: two simultaneous client connects both
    fork a daemon, second''s bind() races first; loser becomes orphaned piper-daemon
    zombie'
  location: files/hooks/czytaj/piper_server.py:60-86, 142-151
  suggestion: Acquire flock on RUN_DIR/server.lock before forking; recheck server_alive()
    while holding lock. Atomic PID_FILE write only after listen() succeeds.
  status: fixed
- id: C5
  severity: critical
  lens: race-conditions
  item: 'FIFO ordering: paplay opens FIFO for read before daemon writes; if daemon
    dies/blocks, paplay hangs holding daemon_lock — entire server stalls'
  location: files/hooks/czytaj/piper_stream.py:189-220, piper_server.py:89-99
  suggestion: Open FIFO non-blocking on writer side; verify paplay consuming before
    issuing synth request; on watch_and_kill kill, also unlink FIFO so daemon write
    fails fast with EPIPE.
  status: fixed
- id: C6
  severity: critical
  lens: install-compat
  item: Piper runtime (binary, libpiper.so, ONNX, voice) never validated; install
    reports OK but TTS silently falls back or fails
  location: files/install.sh:15-23
  suggestion: 'Add explicit checks: piper bin exists+executable, libpiper.so exists,
    espeak-ng-data dir exists, voice ONNX+JSON exist. On miss, print clear instructions
    to set up ~/piper-tts.'
  status: fixed
- id: C7
  severity: critical
  lens: install-compat
  item: 'Conflict with sound-notification addon: it owns Stop hook with `if not ContainsKey(''Stop'')`
    — czytaj-first ordering breaks sound-notification''s installation'
  location: files/install.sh:66 + addons/sound-notification/patch-settings.ps1:45
  suggestion: Harden sound-notification's patch to use per-command idempotency like
    czytaj does. Track as follow-up against sound-notification.
  status: wontfix
- id: C8
  severity: critical
  lens: install-compat
  item: addon.json platform=termux not honored by install-addons.ps1 — Windows users
    running PS installer copy hooks but install.sh fails, leaving partial broken install
  location: addon.json:7
  suggestion: Add platform handling to install-addons.ps1 (skip with message when
    platform=termux on Windows), OR have install.sh detect non-Termux host and abort
    before settings.json mutation.
  status: wontfix
- id: C9
  severity: critical
  lens: leaks
  item: piper-daemon C++ subprocess leaked when run_server() returns early on non-READY
    response
  location: files/hooks/czytaj/piper_server.py:138-140
  suggestion: 'Before early return: daemon.kill(); daemon.wait(). Also add timeout
    to daemon.stdout.readline().'
  status: fixed
- id: M1
  severity: major
  lens: bugs
  item: piper_server.py 'serve' mode does not create RUN_DIR before sock.bind/PID
    write
  location: files/hooks/czytaj/piper_server.py:124-152, czytaj.md:6
  suggestion: Add RUN_DIR.mkdir(parents=True, exist_ok=True) at top of run_server().
  status: fixed
- id: M2
  severity: major
  lens: bugs+leaks
  item: Unused NamedTemporaryFile raw_path created+unlinked every synth; daemon writes
    to wav_out instead
  location: files/hooks/czytaj/piper_server.py:176-194
  suggestion: Remove the NamedTemporaryFile/raw_path block entirely — dead code wasting
    inodes.
  status: fixed
- id: M3
  severity: major
  lens: bugs
  item: Markdown code-block regex r'```[^`]*```' breaks on inline single backticks
    inside fenced blocks; raw markdown spoken aloud
  location: files/hooks/czytaj/_speak.py:136
  suggestion: Replace with re.sub(r'```.*?```', ' ', t, flags=re.DOTALL).
  status: fixed
- id: M4
  severity: major
  lens: race-conditions
  item: Stop hook's pkill kills PreToolUse's in-flight playback while save_state already
    shows speech 'spoken' — user hears nothing for final response
  location: files/hooks/czytaj/_speak.py:179-186, 196-216, 220
  suggestion: Save state AFTER child confirms playback, or reset spoken_text to prior
    boundary on kill_previous=True.
  status: fixed
- id: M5
  severity: major
  lens: race-conditions
  item: 'TOCTOU: /czytaj OFF during 600ms grace window — speak proceeds, ensure_running
    respawns daemon despite OFF intent (ghost daemon)'
  location: files/hooks/czytaj/_speak.py:150,187,196-216 + piper_stream.py:184-216
  suggestion: ensure_running() should check FLAG_FILE before forking. Also recheck
    is_active() immediately before Popen.
  status: fixed
- id: M6
  severity: major
  lens: race-conditions
  item: 'PID recycling false positive: SOCKET_PATH persists after SIGKILL; if PID
    gets recycled, _is_alive returns True for unrelated process'
  location: files/hooks/czytaj/piper_server.py:42-57, 142-151
  suggestion: Probe socket connect() with 200ms timeout in server_alive(); on connect
    failure unlink stale SOCKET_PATH+PID_FILE and respawn.
  status: fixed
- id: M7
  severity: major
  lens: race-conditions
  item: Signal handler shutdown() can run while worker holds daemon_lock; daemon.stdin.close()
    races stdin.write/flush; sys.exit abandons threads
  location: files/hooks/czytaj/piper_server.py:153-154,178-188,205-222
  suggestion: Use graceful-shutdown event; signal sets stop flag; wait for daemon_lock
    free before closing daemon stdin.
  status: fixed
- id: M8
  severity: major
  lens: race-conditions
  item: synthesize_via_daemon's daemon.stdout.readline() has no timeout — hung daemon
    blocks daemon_lock forever for all clients
  location: files/hooks/czytaj/piper_server.py:89-99
  suggestion: Read with select()/timeout; if exceeded, kill daemon and respawn on
    next request.
  status: fixed
- id: M9
  severity: major
  lens: race-conditions
  item: user-prompt-submit.sh deletes state file non-atomically while previous turn's
    Stop hook may still be running — Stop reads empty state and re-speaks
  location: files/hooks/czytaj/user-prompt-submit.sh:9 + _speak.py:63-68
  suggestion: Replace rm with atomic write of empty JSON state via tempfile+os.replace,
    BEFORE pkill.
  status: fixed
- id: M10
  severity: major
  lens: leaks
  item: FIFO writer side never closed if server_speak_raw fails mid-write — paplay
    hangs forever, watcher thread polls forever
  location: files/hooks/czytaj/piper_stream.py:216-218
  suggestion: 'Try/except around server_speak_raw call: on failure, paplay.kill()
    before paplay.wait() and stop_event.set().'
  status: fixed
- id: M11
  severity: major
  lens: leaks
  item: stdin.write to piper_stream Popen can block (>64KB pipe full) — hook process
    hangs
  location: files/hooks/czytaj/_speak.py:204-208
  suggestion: Use proc.communicate(input=..., timeout=4) or write asynchronously.
  status: fixed
- id: M12
  severity: major
  lens: leaks+security
