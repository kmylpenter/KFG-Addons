    lens: architecture
    item: "Both PreToolUse AND Stop call speak_new_text(kill_previous=True) — design intent is PreToolUse APPENDS streaming, Stop COMPLETES. With both killing, streaming question dies on next tool call. Self-contradicting."
    location: "files/hooks/czytaj/pre-tool-use.py:18, files/hooks/czytaj/stop.py:18"
    suggestion: "PreToolUse: kill_previous=False (let prior chunk finish). Stop: kill_previous=False too (state tracks already-spoken suffix). Reserve hard kill for UPS only — that's when new turn starts."
    found_in_iteration: 1
    status: open

  - id: "A4"
