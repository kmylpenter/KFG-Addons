    location: "files/hooks/czytaj/_speak.py:286-300"
    suggestion: "Filter by application.process.binary='paplay' AND parent process is piper_stream. Or set PULSE_PROP_media.name=czytaj-tts-${PID} and only kill matching sink-inputs."
    found_in_iteration: 1
    status: open

  - id: "AC8"
    severity: major
