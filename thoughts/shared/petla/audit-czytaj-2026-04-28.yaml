issues:
  # ───── AUDIO-CONFLICT LENS ─────
  - id: "AC1"
    severity: critical
    lens: audio-conflict
    item: "is_other_audio_playing() always returns False — TTS never checks for active music/voice playback before speaking, so paplay collides with WhatsApp voice messages, Spotify, etc."
    location: "files/hooks/czytaj/_speak.py:61-65"
    suggestion: "Replace stub with real probe. Two viable mechanisms on Termux without root: (a) `dumpsys media_session` parsed for state=PLAYING + package=com.whatsapp/spotify/etc.; (b) `termux-notification-list` filtered for MediaStyle template + matching packageName."
    research:
      - url: "https://github.com/dwaan/homebridge-adb/issues/43"
        finding: "dumpsys media_session works from Termux shell without root, returns active MediaControllers."
      - url: "https://github.com/termux/termux-api/issues/575"
        finding: "termux-notification-list returns JSON of ongoing notifications including MediaStyle from WhatsApp/Spotify."
    found_in_iteration: 1
    status: open

  - id: "AC2"
    severity: critical
    lens: audio-conflict
    item: "paplay invoked WITHOUT setting media.role=phone — PulseAudio module-role-cork IS loaded but inert because no role is declared on the stream. Even Termux-internal cork/duck doesn't trigger."
    location: "files/hooks/czytaj/piper_stream.py:210-221"
    suggestion: "Set env={**os.environ, 'PULSE_PROP_media.role': 'phone'} on paplay Popen. Verified: pactl list short modules shows role-cork active. THIS IS THE 5-LINE TIER-1 WIN that eliminates Termux-internal collisions."
    research:
      - url: "https://www.freedesktop.org/wiki/Software/PulseAudio/Documentation/Developer/Clients/ApplicationProperties/"
        finding: "PULSE_PROP_media.role env var is auto-imported by PulseAudio client libs."
    found_in_iteration: 1
    status: open

  - id: "AC3"
    severity: critical
    lens: audio-conflict
    item: "No Android-level audio focus requested — paplay routes through Termux's module-sles-sink, presented to Android as one anonymous OpenSL ES client. Android's per-app audio focus arbitration cannot see paplay separately. WhatsApp's voice msg never gets paused."
    location: "files/hooks/czytaj/_speak.py:39-43; files/hooks/czytaj/piper_stream.py:44-82"
    suggestion: "Tier-3 fix (most robust): route TTS through `termux-media-player play <wavfile>` instead of paplay. Termux:API APK's MediaPlayer auto-requests focus on music stream. Cost: 80-150ms extra latency vs streaming. Caveat: API 35+ blocks requestAudioFocus from non-foreground apps (this device is API 36) — Tier-2 detect-and-defer may be more practical."
    research:
      - url: "https://developer.android.com/media/optimize/audio-focus"
        finding: "Android 12+ enforces audio focus; 15+ blocks request from non-foreground. PulseAudio sink-side cannot request focus."
    found_in_iteration: 1
    status: open

  - id: "AC4"
    severity: major
    lens: audio-conflict
    item: "user-prompt-submit.sh actively kills foreign audio every turn start — calls termux-media-player stop and pkills paplay/piper without checking ownership. If WhatsApp uses Termux media-player surface, this is destructive."
    location: "files/hooks/czytaj/user-prompt-submit.sh:14-15, 38-40"
    suggestion: "Gate kills on is_other_audio_playing() once implemented. Filter by application.process.binary=paplay AND parent in piper_stream tree. Use PULSE_PROP_media.name=czytaj-tts-${PID} as cookie."
    found_in_iteration: 1
    status: open

  - id: "AC5"
    severity: major
    lens: audio-conflict
    item: "is_in_call() returns False unconditionally — czytaj will speak DURING active phone calls and WhatsApp calls."
    location: "files/hooks/czytaj/_speak.py:54-58"
    suggestion: "Use termux-notification-list filtered for category='call' OR packageName=com.android.server.telecom — visible without root."
    research:
      - url: "https://github.com/termux/termux-api/issues/575"
        finding: "Ongoing call notifications visible via notification-listener API (one-time consent)."
    found_in_iteration: 1
    status: open

  - id: "AC6"
    severity: minor
    lens: audio-conflict
    item: "unlock_audio_routing() plays audible 80Hz tone every 60s — itself interrupts other audio. preheat is solving a problem termux-media-player had, not paplay."
    location: "files/hooks/czytaj/piper_stream.py:44-82"
    suggestion: "Delete unlock_audio_routing entirely OR gate on is_other_audio_playing(). Per Termux issue #27978: paplay keeps OpenSL ES output alive for daemon lifetime — no further routing wake needed once paplay has streamed once."
    found_in_iteration: 1
    status: open

  - id: "AC7"
    severity: minor
