    title: "Ledger rewrite is truncate-then-write in place (partial-write window)"
    item: "Ledger RMW does os.ftruncate(fd,0) then os.write inside try/except OSError: pass. A failed write after a successful truncate leaves an empty ledger, resetting the dedup window (could allow a duplicate read). Low likelihood."
