    location: "_speak.py:173-174 (is_recording) ; _speak.py:381,389 (IME exclusion) ; piper_stream.py:258 (interrupt on same dead flag)"
    evidence: "_speak.py:389 'if not pkg or pkg in ime_pkgs: continue'; _speak.py:174 'return os.path.isfile(VOICE_TYPER_FLAG)' + handoff: Termux-flags dir empty during dictation."
    root_cause: "No live mic signal for an IME-based dictation keyboard once the keyboard stopped writing a flag; Shizuku probe deliberately ignores IMEs to avoid permanent muting."
    suggestion: "USER DECISION D-BUGA. If keyboard can write a flag → path fix (_resolve_voice_typer_flag already drafted) suffices. Else → add an allowlist so is_mic_recording_global treats the Voice Typer package as a real recorder despite being an IME (invert the :389 skip for that one pkg). Need exact Android package name."
    fix_group: mic-detection
    needs_user_decision: D-BUGA

