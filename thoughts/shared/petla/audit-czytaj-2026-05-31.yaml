  # ── ITERATION-3 minor (deep _speak.py internals + completeness gaps) ──
  - id: F45
    severity: minor
    lens: [deep-untraced-_speak]
    origin_ids: [D3-3]
    confidence: MEDIUM
    is_new: true
    title: "State load/save is not a single-lock RMW (lost-update) + save_state docstring overclaims the guarantee"
    item: "load_state (shared lock, read) and save_state (exclusive lock, write) are separate critical sections; concurrent PreToolUse+Stop both read old state, last write wins. SPEAK_LOCK mitigates in practice, but save_state's docstring claims 'can't lose updates' which is false (it guarantees torn-write protection only)."
    location: "_speak.py:530-547 (load) + 549-586 (save); SPEAK_LOCK at :892 is the real serializer"
    evidence: "save_state docstring: 'concurrent PreToolUse + Stop hooks can't lose updates' — lock spans only the write."
    root_cause: "Write-atomicity conflated with read-modify-write serialization."
    suggestion: "Fix the docstring to state the guarantee (torn-write protection; lost-update prevention relies on SPEAK_LOCK), or do a single load-modify-save under one exclusive lock."
    fix_group: robustness

  - id: F46
    severity: minor
    lens: [deep-untraced-_speak]
    origin_ids: [D3-4]
    confidence: HIGH
    is_new: true
    title: "Screen cache has no flock + truncate-then-write → torn read returns '' → treated as LOCKED → fails CLOSED (suppresses TTS)"
    item: "_write_screen_cache opens 'w' (truncate) then writes 1 byte with no lock; a concurrent _read_screen_cache can read empty → v=='1' False → cached=False (locked) → is_screen_unlocked returns False → SKIP. Fails closed, contradicting the module's fail-open intent for screen probes."
    location: "_speak.py:236-258 (read 245-249, write 252-258); consumed 314-315"
    evidence: "_speak.py:252-254 open(SCREEN_CACHE,'w'); reader :245-249 returns v=='1'."
    root_cause: "Non-atomic cache file; reader treats empty as '0' (locked)."
    suggestion: "Write atomically (tmp + os.replace) like ACTIVE_SESSION/LAST_FOLDER, or treat empty/short read as cache-miss (re-probe / fail open)."
    fix_group: robustness

  - id: F47
    severity: minor
    lens: [deep-untraced-_speak]
    origin_ids: [D3-5]
    confidence: HIGH
    is_new: true
    title: "load_state lacks isinstance(dict) guard → a valid non-dict JSON ([], number) → AttributeError → nonzero hook exit"
    item: "json.load on a syntactically valid non-dict payload doesn't raise ValueError, so it's returned as-is; state.get(...) then raises AttributeError → uncaught → hook exits nonzero. _ledger_claim DOES guard with isinstance; load_state does not."
    location: "_speak.py:530-547 (no dict check) ; crash site ~:919"
    evidence: "_speak.py 'return json.load(f)' with 'except (OSError, ValueError)' only; consumer state.get('spoken_text',…)."
    root_cause: "Only OSError/ValueError caught; a JSON array parses cleanly and propagates."
    suggestion: "data = json.load(f); return data if isinstance(data, dict) else {'last_uuid':'','spoken_text':''}. (Pairs with F22 main()-wrap.)"
    fix_group: robustness

  - id: F48
    severity: minor
    lens: [deep-untraced-_speak]
    origin_ids: [D3-6, D3-7]
    confidence: HIGH
    is_new: true
    title: "Probe cache TTL doc/behavior drift (docstrings say 1s/1.5s, code uses 5.0s) + _enabled_ime_packages fail-mode → over-suppression"
    item: >
      is_mic_recording_global docstring says 'Cached for 1s', is_external_media_playing 'Cached for 1.5s', but both use
      PROBE_CACHE_TTL_S=5.0 → mic/media state stale up to 5s (a just-ended call can suppress TTS ~5s; a just-started
      recording unseen ~5s). Separately _enabled_ime_packages returns the (possibly empty) cache on 'ime list' failure →
      empty ime set → IMEs NOT excluded → is_mic_recording_global may report recording=True → permanent SKIP; and the
      'and cached' guard forces an ime-list subprocess on every mic probe when the cache is empty.
    location: "_speak.py:29 (=5.0), 366/371 (mic), 410/415 (media), 332-354 (ime cache)"
    evidence: "PROBE_CACHE_TTL_S=5.0; docstrings '1s'/'1.5s'; _enabled_ime_packages ':340 'and cached'', :344-346 'if not ok: return cached'."
    root_cause: "Per-function docstrings predate the unified 5.0s constant; empty-frozenset is both 'unknown' and 'known-empty' sentinel; ime-list failure fails CLOSED (over-suppress)."
    suggestion: "Lower/split the TTL and fix docstrings; use a None sentinel for 'unknown' ime set and fail OPEN (treat mic as not-recording) on ime-list failure, consistent with the rest of the probe's fail-open intent."
    fix_group: mic-detection

  - id: F49
    severity: minor
    lens: [completeness-critic]
    origin_ids: [CC-1]
    confidence: HIGH
    is_new: true
    title: "install.sh wipes ~/.claude/czytaj-pause.flag on EVERY reinstall → silently cancels an active user pause"
