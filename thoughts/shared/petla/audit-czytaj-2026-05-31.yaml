    item: "Repo .sh are -rw------- (toggle.sh has NO +x; user-prompt-submit.sh -rwx------); installed .sh are -rwxr-xr-x. install.sh:93 'chmod 755 *.sh' fixes this on a real install, BUT the handoff's documented manual sync ('cp repo→installed') has no chmod → a hand-deployed hook is non-executable."
