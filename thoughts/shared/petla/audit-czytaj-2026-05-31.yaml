  - id: F9
    severity: major
    lens: [audio-runtime]
    origin_ids: [D1]
    confidence: HIGH   # mechanism; on-device 'piper --help' confirmation required
    is_new: false   # confirms known BUG D
    title: "BUG D tempo: PIPER_LENGTH_SCALE env var likely ignored by piper1-gpl C++ binary"
    item: >
      Length-scale is delivered ONLY via the PIPER_LENGTH_SCALE env var. The piper1-gpl C++ binary/daemon
      ('-m … -f …' form) is not the rhasspy python wrapper that honored that env var; no '--length-scale'
      CLI flag is ever passed, and the daemon protocol carries only path+text. So the voice's default
      length_scale (~1.0) plays instead of 0.6 → audibly slower. Present identically in HEAD → this is the
      real tempo cause, not a half-edit regression. (Sample-rate header is correctly 22050 → NOT the cause.)
    location: "piper_stream.py:177-181 (one-shot) ; piper_server.py:164,167,242 (daemon spawn) ; piper_server.py:189-190 (protocol)"
    evidence: "piper_stream.py:180-181 argv has no length flag; piper_server.py:189-190 protocol = path+text only; grep '--length'/'length_scale' flag → 0 hits."
    root_cause: "Assumes libpiper honors the rhasspy env var; it reads length_scale from the voice .onnx.json or a CLI/JSON arg."
    suggestion: "On-device: confirm exact flag via '<piper> --help'. Then EITHER add '--length-scale 0.6' (or '--length_scale') to argv at piper_stream.py:181 AND piper_server.py daemon argv; OR patch pl_PL-gosia-medium.onnx.json 'length_scale' to 0.6; OR send a JSON synth-config line on the daemon stdin. Keep env as fallback. Do not go below ~0.5."
    fix_group: tempo
    smoke_required: false   # user must confirm flag + audibly verify tempo on-device

  - id: F10
    severity: major
    lens: [audio-runtime]
    origin_ids: [A1]
    confidence: HIGH
