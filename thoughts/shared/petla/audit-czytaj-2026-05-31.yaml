    location: "_speak.py:279-282"
    evidence: "_speak.py:280 'if prefix[0]==\"rish\": cmd = prefix + [shell_cmd]' else ':282 cmd = prefix + shell_cmd.split()'."
    root_cause: "Two transports handle shell metacharacters inconsistently; adb branch assumes the remote shell re-joins+re-parses split tokens (implementation-defined)."
    suggestion: "For the adb branch also pass one arg: cmd = prefix + [shell_cmd] (adb shell joins+runs in a remote shell), matching rish; add a comment that shell_cmd is a trusted constant."
    fix_group: robustness

  - id: F43
    severity: major
    lens: [deep-untraced-_speak]
    origin_ids: [D3-2]
    confidence: HIGH
    is_new: true
    title: "_kill_audio_chain() runs BEFORE the final abort gate → previous audio killed then we bail = dead air"
    item: >
      In speak_new_text the kill_previous path calls _kill_audio_chain() at :945, THEN the abort gate
      (wait_for_recording_grace / is_in_call / not is_active) at :948 can return 0. If a recording flag appears in the
      grace window, or /czytaj was toggled off between the early is_active() (:854) and here, the previous turn's audio
      is already pkilled but nothing new plays → the active utterance is cut off into silence.
    location: "_speak.py:945-949"
    evidence: "_speak.py:945 'if kill_previous: _kill_audio_chain()' then :948 'if wait_for_recording_grace() or is_in_call() or not is_active(): return 0'."
    root_cause: "Destructive kill precedes the late re-check; killing should only happen once committed to speaking."
    suggestion: "Move _kill_audio_chain() to AFTER the abort gate (re-check recording/in-call/is_active first, then kill, then claim ledger + play)."
    fix_group: channel-lock

