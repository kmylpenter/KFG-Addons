solve_directives:
  baseline_is_GLOBAL_not_partial: "VERIFIED installed ~/.claude/hooks/czytaj/ == HEAD a27e132 is the COHERENT GLOBAL flag model (audibly working). Per-project is a from-SCRATCH rewrite across 6+ files, NOT 'finishing' a migration. Failure = 100% silent reading, NO error (py_compile/bash -n pass — the break is logical)."
  D_BASELINE_revert_is_destructive: "The half-edit bundles THREE separable concerns: (1) per-project read-side [INCOHERENT=the bug], (2) _resolve_voice_typer_flag() path fix in BOTH _speak.py:76 AND piper_stream.py:48 [GOOD, drafted BUG-A path fix], (3) the piper_stream interrupt branch [GOOD]. 'git checkout' reverts ALL THREE. If reverting, FIRST extract (2)+(3) as their own commits, THEN revert only the per-project hunk. Treat the half-edit as 3 patches."
  per_project_ONE_canonical_dir_source: "CRITICAL (FC-1): toggle.sh hashing ${CLAUDE_PROJECT_DIR:-$PWD} while hooks hash data['cwd'] does NOT match when the user cd's into a SUBDIR (parent vs subdir → different sha1 → silent miss again). Pick ONE source for BOTH sides — recommended: everyone resolves CLAUDE_PROJECT_DIR (hooks: os.environ.get('CLAUDE_PROJECT_DIR') or data['cwd']; is_active must PREFER it over os.getcwd())."
  keep_the_sh_wrappers: "RR-2: the 3 .sh wrappers are the registered entrypoints (install.sh:140-142). Prefer F18 option-B: bash does only a cheap 'czytaj-flags/ non-empty?' existence gate (sha1 in ONE place=python); stop.py/pre-tool-use.py are the single keyed authority via is_active(canonical_dir). user-prompt-submit.sh has UNIQUE side-effects (mark_active_session, reset_state_atomic, client-kill) with NO .py equivalent — do NOT re-point settings.json to the .py."
  printf_not_echo: "sha1 parity VERIFIED: printf '%s' \"$(realpath D)\" | sha1sum == hashlib.sha1(os.path.realpath(D).encode()) (9bef3e9…). 'echo' adds a newline → different hash. The fix MUST use printf '%s'."
  channel_lock_lives_in_the_child: "FC-4/RR-3: SPEAK_LOCK is released before the detached piper_stream grandchild plays; only that child outlives the wav. The channel reservation must be ADVISORY STATE (end-ts + owner-tid + priority) checked at play-time INSIDE piper_stream, NOT an flock held across its blocking poll (that blocks the active pane or makes it self-skip). Pass an owner/priority token INTO piper_stream (today only text crosses on stdin). Background claims only if end-ts passed; active pane preempts via targeted SIGTERM (per F21) then claims. Auto-expire stale claims."
  ordering_bug_A_after_channel_lock: "FC-5/RR-6: fixing BUG A (F10) ARMS the dormant untargeted 'termux-media-player stop' (F7) → channel-lock ownership (F3/F7) MUST land BEFORE/WITH F10. The IME-allowlist branch can regress to PERMANENT silence — prefer the flag-file path; if forced into allowlist, require idle→busy edge-detect + auto-clear."
  tempo_prefer_tracked_vehicle: "FC-6/RR-5: deliver length-scale via a CLI flag in BOTH argv sites (piper_stream.py:181 AND piper_server.py daemon argv) — tracked, survives reinstall. Editing pl_PL-gosia-medium.onnx.json covers both paths+restart BUT is OUTSIDE install.sh's allowlist → reverts on reinstall (if used, ALSO add to install.sh). Confirm the exact flag via '<piper> --help' on-device. A stale daemon keeps the old value (F19/F20) → teardown must restart it."
  unify_in_use_predicate: "FC-7: define ONE 'is czytaj in use' predicate = 'czytaj-flags/ non-empty' and route F4 OFF-teardown + F32/F50 install WAS_ON + the toggle daemon-kill through it (OFF in project A must not silence project B)."
  per_fix_group_atomic_commits: "RR-4: NO automated audio test, and czytaj is NOT browser-testable (/petla smoke does NOT apply). One commit per fix_group, each revertible to a27e132. STOP for on-device user verification before/after each HIGH/MED group."
