    suggestion: "Mirror one precedence everywhere: RUN_DIR=\"${XDG_RUNTIME_DIR:-${TMPDIR:-/tmp}}/piper-server\" in shell, OR have toggle delegate teardown to a piper_server.py 'stop' subcommand. Also unlink stale socket in server_alive() when _can_connect fails."
