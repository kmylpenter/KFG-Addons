    severity: major
    lens: [flag-coherence]
    origin_ids: [B3]
    confidence: HIGH
    is_new: false
    title: "toggle.sh OFF tears down audio GLOBALLY → silences other projects"
    item: "OFF branch unconditionally runs 'termux-media-player stop', pkills piper_server/piper-daemon/paplay/piper_stream/termux-tts-speak, and rm -rf RUN_DIR. With per-project mode, /czytaj OFF in project A disrupts project B still reading."
    location: "toggle.sh:9-13"
    evidence: "toggle.sh:9 'termux-media-player stop'; :10-12 pkill loop; :13 'rm -rf \"$RUN_DIR\"'. No guard on remaining czytaj-flags/ entries."
    root_cause: "toggle.sh teardown predates per-project mode; it is global."
    suggestion: "After removing this project's flag, gate the global teardown on empty dir: if [ -z \"$(ls -A ~/.claude/czytaj-flags 2>/dev/null)\" ]; then <teardown>; fi"
    fix_group: per-project-flag
    needs_user_decision: D-BASELINE

