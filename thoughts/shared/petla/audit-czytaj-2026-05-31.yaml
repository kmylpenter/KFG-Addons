    origin_ids: [R3, self-check]
    confidence: HIGH
    is_new: true
    title: "Silent failures: termux-media-player unavailable + ALL piper errors swallowed (stderr DEVNULL, no _log)"
    item: "When 'play' fails (binary 'command not found' → OSError caught, returns silently) there is no _log; every piper spawn uses stderr=DEVNULL with no error log on failure. BUG-D-class and intermittent-mount issues are undiagnosable from czytaj.log."
