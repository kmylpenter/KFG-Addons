issues:
  # ══════════════════ CRITICAL ══════════════════
  - id: F1
    severity: critical
    lens: [flag-coherence, path-resolution, repo-installed-sync]
    origin_ids: [B1, P2, S1]
    confidence: HIGH
    is_new: false   # confirms known BUG B
    title: "Per-project flag incoherence: global write vs per-project read → deploy kills reading mode"
    item: >
      _speak.py is_active() (line 117) reads a PER-PROJECT flag ~/.claude/czytaj-flags/<sha1(realpath)>.flag
      with NO legacy fallback, but toggle.sh (lines 7,8,16) and user-prompt-submit.sh (line 15) still
      write/read the GLOBAL ~/.claude/czytaj.flag. If the repo working tree is deployed/committed as-is,
      /czytaj reports ON, writes the global flag, yet is_active() stays False forever → permanent silence,
      no error.
    location: "_speak.py:18,113-117 ; toggle.sh:7,8,16 ; user-prompt-submit.sh:15"
    evidence: "toggle.sh:16 'touch \"$HOME/.claude/czytaj.flag\"'; _speak.py:117 'return os.path.isfile(_project_flag(cwd))'; grep czytaj-flags|sha1sum|_project_flag in *.sh → ZERO hits. py_compile passes (logical, not syntactic, breakage)."
    root_cause: "BUG B fix applied to the Python read-side only; the bash write-side never converted. Removing the global fallback turned 'still global' into 'permanently off'."
    suggestion: "COMPLETE-OR-REVERT across all files together (see D-BASELINE). If finishing: toggle.sh + user-prompt-submit.sh compute KEY=$(printf '%s' \"$(realpath \"${CLAUDE_PROJECT_DIR:-$PWD}\")\" | sha1sum | cut -d' ' -f1) and write/check ~/.claude/czytaj-flags/$KEY.flag. MUST use printf '%s' NOT echo (newline breaks sha1 parity — verified, see notes)."
    fix_group: per-project-flag
    needs_user_decision: D-BASELINE

  - id: F2
    severity: critical
    lens: [flag-coherence, path-resolution, concurrency, repo-installed-sync]
    origin_ids: [B2, P1, C7, S2]
    confidence: HIGH
    is_new: true
    title: "is_active() called without cwd at 4 sites → per-project keying unsound even after bash fix"
    item: >
      speak_new_text(…, cwd) threads cwd into _project_label and the ledger, but its OWN is_active()
      guards ignore it, and the two hook entrypoints guard before reading cwd. So activation keys off
      os.getcwd() of the hook process, not the hook-provided project realpath that toggle.sh would hash.
      Even if BUG B is finished bash-side, the sha1 keys won't line up unless os.getcwd() == that realpath.
    location: "_speak.py:854 'if not is_active():' ; _speak.py:948 'or not is_active()' ; stop.py:12 ; pre-tool-use.py:12"
    evidence: "_speak.py:851 signature 'speak_new_text(transcript_path, kill_previous, cwd=\"\")' but :854/:948 call bare is_active(); is_active(cwd='') → _project_flag → :108 'os.path.realpath(cwd or os.getcwd())'. stop.py:21 DOES pass cwd to speak_new_text, proving the plumbing is half-wired."
    root_cause: "cwd param added + forwarded to labels/ledger but not to the is_active() gates; default arg silently swallows the omission (no NameError)."
    suggestion: "Forward cwd everywhere: _speak.py:854/:948 → is_active(cwd); stop.py:12 & pre-tool-use.py:12 → read data first, then is_active(data.get('cwd','')). Assert os.getcwd()/data['cwd'] realpath == the dir toggle.sh hashes. Land with F1."
    fix_group: per-project-flag
    needs_user_decision: D-BASELINE

  - id: F3
    severity: critical
    lens: [concurrency]
    origin_ids: [C1, C2]
    confidence: HIGH
    is_new: false   # confirms known BUG C + new C2 facet
    title: "No cross-window playback channel lock; ledger only dedups identical text"
    item: >
      _play_via_termux_blocking issues 'termux-media-player play' with NO busy-check at the point of play,
      and the single shared Android MediaPlayer means any window reaching that line cuts off whatever
      another window is playing. The only guard, is_self_already_speaking(), is a stateless probe run
      seconds earlier and far upstream (separated by the whole _speak_inner pipeline + piper synthesis in a
      detached child). The X4 content-hash ledger keys on sha1(label+text), so two DIFFERENT replies in two
      windows both claim and both play — the ledger is NOT a mutual-exclusion lock for the shared player.
    location: "piper_stream.py:247-251 (play) ; _speak.py:871-875,502 (only probe) ; _speak.py:956-959 (ledger key)"
    evidence: "piper_stream.py:248-251 subprocess.run(['termux-media-player','play',str(audio)]…) — no preceding info/lock check. _speak.py:255 'time.sleep(0.3) # let info flip to Playing' hints the probe is laggy → widens TOCTOU."
    root_cause: "A 'is it playing?' probe (state) is used where a held 'channel reservation' (lock) is required; dedup ledger and channel-busy decision are conflated."
    suggestion: "Add a real flock'd channel lock ~/.claude/czytaj-channel.lock storing end-ts + owner-transcript-id, claimed immediately before play and held for wav duration. Background pane may claim only when end-ts passed; active pane may preempt. flock on /root/.claude is valid cross-process (all hooks run in same PRoot)."
    fix_group: channel-lock
    smoke_required: false   # not browser-testable; user must verify on-device with 2 windows

  # ══════════════════ MAJOR ══════════════════
