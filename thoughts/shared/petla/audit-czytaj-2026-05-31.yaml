    location: "piper_stream.py:258-266 (interrupt) ; piper_stream.py:108-146 (unlock_audio_routing), called :400,413,423"
    evidence: "piper_stream.py:258 'if os.path.isfile(VOICE_TYPER_FLAG): …stop…; break'; :125-129 stop + :133-139 play tone + :140 sleep(0.9). VOICE_TYPER_FLAG is a single global path, 'stop' has no target."
    root_cause: "Per-utterance/per-sink intent implemented as a global stop on a shared player with no ownership token."
    suggestion: "Gate both on F3 channel ownership (only stop if I'm the current owner). On native (no-pulse) path, skip unlock_audio_routing entirely — the routing tone is a PulseAudio concern, harmful on the shared MediaPlayer."
    fix_group: channel-lock

  - id: F8
    severity: minor   # DOWNGRADED iter3 (completeness-critic): install.sh:93 already chmods — only the MANUAL sync is exposed
    lens: [repo-installed-sync]
