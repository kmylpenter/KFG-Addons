  - id: F6
    severity: major
    lens: [concurrency]
    origin_ids: [C4, C5]
    confidence: HIGH
    is_new: true
    title: "SPEAK_LOCK guards the decision not the resource; priority gate racy + fail-open TTL"
    item: >
      SPEAK_LOCK is released (_speak.py:905) as soon as the detached piper_stream child is spawned
      (proc.communicate timeout=2, start_new_session=True), i.e. seconds before audio plays — so it
      protects state reads, never playback. The active-vs-background priority is a one-shot stateless
      probe; is_active_session fails OPEN after ACTIVE_SESSION_TTL_S (300s), after which every pane is
      'active' and races with kill_previous=True.
    location: "_speak.py:882-908 (lock lifetime) ; :991-1009 (detached child) ; :145-170 (fail-open TTL)"
    evidence: "_speak.py:1004 'proc.communicate(input=…, timeout=2)'; :168-170 'if time.time()-marked_at > ACTIVE_SESSION_TTL_S: return True'."
    root_cause: "Lock guards the decision phase; playback lifetime lives in a detached grandchild outside any lock."
    suggestion: "Fold priority into the F3 channel-lock (store owner=transcript_id + end-ts; re-evaluate under the lock at play time, not via an early probe). Keep SPEAK_LOCK only for decision serialization."
    fix_group: channel-lock

  - id: F7
    severity: major
    lens: [concurrency]
    origin_ids: [C3, C6]
    confidence: MEDIUM
    is_new: true
    title: "Untargeted 'termux-media-player stop' (interrupt + preheat) kills OTHER window's playback"
    item: >
      The half-edit Voice-Typer interrupt (piper_stream.py:258-266) and unlock_audio_routing (stop+0.9s tone,
      :124-140) both issue an UNtargeted 'stop' on the shared player. One pane's stop/tone cuts another pane's
