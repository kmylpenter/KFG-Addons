  - id: F11
    severity: minor
    lens: [path-resolution]
    origin_ids: [P3, P4]
    confidence: HIGH
    is_new: true
    title: "Scratch/preheat fallback can return a PRoot-invisible path → silent ENOENT on native player"
    item: >
      _audio_scratch_dir() last-resort returns tempfile.gettempdir() (PRoot /tmp/$TMPDIR — Android-invisible);
      _staged_tone() on copy failure returns the in-PRoot source wav. On the native (termux-media-player) path
      both feed a path the Android player cannot open → silent no-sound. Latent today (preferred dirs exist) but
      it is exactly the a27e132 ENOENT bug re-introduced as a silent fallback.
    location: "piper_stream.py:88 (scratch fallback, reached from :417) ; piper_stream.py:105 (staged_tone fallback, consumed :120,134)"
    evidence: "piper_stream.py:88 'return Path(tempfile.gettempdir())'; :98-105 'except OSError: return src'."
    root_cause: "Generic temp fallback is correct only for the paplay/PRoot backend; the termux-media-player consumer needs an Android-readable path."
    suggestion: "On the native path, do NOT fall back to gettempdir()/PRoot src; if no Termux-readable scratch is writable, _log loudly and return failure (preheat: return None and skip)."
    fix_group: path-safety

  - id: F12
    severity: minor
    lens: [audio-runtime]
    origin_ids: [R1]
    confidence: HIGH
