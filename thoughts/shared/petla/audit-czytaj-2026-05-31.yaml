    location: "piper_stream.py:256-266 vs :149-167 (watch_and_kill)"
    evidence: "piper_stream.py:259-266 stop+break only; synthesize_one_shot:180 has no flag check, timeout=60."
    root_cause: "Interrupt bolted onto playback poll only; synthesis is the earlier phase and is not flag-aware on native."
    suggestion: "Low priority. If tighter interruption wanted: check VOICE_TYPER_FLAG just before play (covered) AND poll it inside synthesize_one_shot, or move the flag-check into _speak.py before spawning piper_stream. Depends on F10 first."
