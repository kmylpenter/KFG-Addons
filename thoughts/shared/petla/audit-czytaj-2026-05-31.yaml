    root_cause: "Asymmetric encoding contract: writer pins utf-8, reader trusts locale."
    suggestion: "Read bytes explicitly: text = sys.stdin.buffer.read().decode('utf-8','replace').strip(); or export PYTHONIOENCODING=utf-8 when spawning piper_stream."
    fix_group: robustness

