  Plan ma solid empirical foundation ALE narusza minimal-change-principle i ma
  5 KRYTYCZNYCH gaps które uniemożliwiają implementację bez wymyślania na
  bieżąco. Zalecenie: REVISE plan zanim ruszysz F1.

  Najwyższy priorytet (must-fix przed F1):
  1. Rename mode na Polish (dym) + lib path na capability-based (browser-smoke)
  2. Split scope: M1=standalone smoke (3 pliki, ship-able alone), M2=integration
  3. Specify all contract gaps: runTest() schema, exit codes, smoke-coverage lens
     rubric, AI test-generator subagent prompt
  4. Add security mitigations: prompt injection (RCE risk), supply chain pin
  5. Add operational concerns: port discovery, dev server cleanup, INCONCLUSIVE
     handling, fan-out semantics
